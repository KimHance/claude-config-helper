name: Update Review Criteria

on:
  schedule:
    - cron: '0 17 * * 6'  # Every Sunday 02:00 KST (Saturday 17:00 UTC)
  workflow_dispatch: {}

jobs:
  update-criteria:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update review criteria
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --permission-mode bypassPermissions
          prompt: |
            You are maintaining a Claude Code configuration review plugin (cchelp).
            Your job is to check if the review checklists and generation templates
            need updating based on recent Claude Code releases.

            ## Step 1: Detect Changes

            Check Claude Code releases from the past 7 days. Since `gh` CLI is not
            available, use WebFetch to read:
            - https://github.com/anthropics/claude-code/releases

            Extract changes related to these keywords:
            hook, event, skill, frontmatter, agent, subagent, MCP, transport,
            memory, CLAUDE.md, rules, command, slash, settings, permission

            If no releases in the past 7 days, or no relevant changes found,
            output "No updates needed" and stop.

            ## Step 2: Impact Analysis

            Read `.github/criteria-mapping.yml` to determine which files are affected.

            For each affected category:
            1. Read the official docs page (use WebFetch with the docs_url from mapping)
            2. Read the current checklist/template file in this repo
            3. Identify specific differences (new fields, removed options, changed behavior)

            ## Step 3: Update Files

            Modify only the affected checklist and/or template files:
            - Add new checklist items for new features
            - Update existing items if behavior changed
            - Do NOT delete existing items (humans decide removals)

            Allowed files to modify:
            - skills/review/references/*.md
            - skills/generate/references/*.md
            - .claude-plugin/plugin.json (version field only)
            - .claude-plugin/marketplace.json (version field only)
            - README.md (Self-Review section only)

            Do NOT modify:
            - agents/*.md
            - skills/*/SKILL.md
            - CLAUDE.md

            ## Step 4: Partial Self-Review

            After updating checklist files, run a partial self-review:

            1. Identify which categories had checklist changes (from git diff)
            2. For each changed category, review THIS project against the NEW checklist
            3. If the changed category is Skills or Subagents (benchmark: true in mapping),
               also run benchmark evaluation (eval-runner pairs: with-skill vs baseline)

            ## Step 4.5: Quality Gate

            Check the overall grade from the self-review:
            - If A- or above: proceed to Step 5
            - If below A- (B+ or lower):
              1. Identify which checklist items failed
              2. Fix the issues in the checklist/template files
              3. Re-run the self-review for affected categories
              4. Repeat up to 3 times maximum
            - If still below A- after 3 attempts:
              - Proceed with PR creation anyway
              - After PR is created, add a review comment on the PR:
                "⚠️ Self-review grade remained below A- after 3 retry attempts.
                Manual review required for the following categories: [list categories and grades]"

            ## Step 5: Version Bump

            Determine the bump level based on the scope of changes:
            - patch: minor edits to existing items, small number of additions
            - minor: new sections added, many new checklist items
            - major: category structure changes, large-scale modifications

            1. Read current version from `.claude-plugin/plugin.json`
            2. Bump the version accordingly
            3. Update `version` in both `.claude-plugin/plugin.json` and `.claude-plugin/marketplace.json`

            ## Step 6: Merge Results into README

            Read the current README.md.
            Update the Self-Review section:
            - Replace the Grade, Issues, Benchmark columns for changed categories only
            - Keep all other rows exactly as they are
            - If benchmarks were run, update the Metric table too
            - Update the version in the section header (e.g. "## Self-Review (v1.6.0)")

            Also update the Features > Review table ("What it checks" column):
            - For any category whose checklist changed, update the description
              to reflect the current key check areas (short comma-separated list,
              matching existing style)

            ## Step 7: Create PR

            Create a pull request using `gh pr create` with:
            - Title: "chore: update review criteria vX.Y.Z (YYYY-MM-DD)"
            - Labels: automated, criteria-update
            - Reviewer: KimHance
            - Body must include:
              - Which Claude Code releases were referenced
              - Which categories were updated and why
              - Summary of checklist changes
              - Partial self-review results
              - Version bump level and reason
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebFetch"

