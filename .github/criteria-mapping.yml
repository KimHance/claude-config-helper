# Keyword-to-file mapping for weekly criteria update workflow.
# Claude uses this to determine which checklist/template files
# are affected by Claude Code release changes.

mappings:
  - keywords: [hook, event, lifecycle]
    docs_url: https://code.claude.com/docs/en/hooks
    review_file: skills/review/references/hooks-checklist.md
    generate_file: skills/generate/references/hooks-template.md
    benchmark: false

  - keywords: [skill, frontmatter, SKILL.md]
    docs_url: https://code.claude.com/docs/en/skills
    review_file: skills/review/references/skills-checklist.md
    generate_file: skills/generate/references/skill-template.md
    benchmark: true

  - keywords: [agent, subagent]
    docs_url: https://code.claude.com/docs/en/sub-agents
    review_file: skills/review/references/agents-checklist.md
    generate_file: skills/generate/references/agent-template.md
    benchmark: true

  - keywords: [MCP, transport, server, mcp]
    docs_url: https://code.claude.com/docs/en/mcp
    review_file: skills/review/references/mcp-checklist.md
    generate_file: skills/generate/references/mcp-template.md
    benchmark: false

  - keywords: [memory, MEMORY.md]
    docs_url: https://code.claude.com/docs/en/memory
    review_file: skills/review/references/memory-checklist.md
    generate_file: skills/generate/references/memory-template.md
    benchmark: false

  - keywords: [CLAUDE.md, rules, instructions]
    docs_url: https://code.claude.com/docs/en/memory
    review_file: skills/review/references/claude-md-checklist.md
    generate_file: skills/generate/references/claude-md-template.md
    benchmark: false

  - keywords: [command, slash]
    docs_url: https://code.claude.com/docs/en/commands
    review_file: skills/review/references/commands-checklist.md
    generate_file: skills/generate/references/command-template.md
    benchmark: false

  - keywords: [settings, permission]
    docs_url: https://code.claude.com/docs/en/settings
    review_file: null
    generate_file: skills/generate/references/settings-template.md
    benchmark: false
